name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: What should we add or change?
      placeholder: What problem does it solve, and how would you use it?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context (optional)
